<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1" />
    
    <!-- PWA Theme Colors -->
    <meta name="theme-color" content="#01375A" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#01375A" media="(prefers-color-scheme: dark)" />
    
    <!-- Apple PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PagLuz" />
    
    <!-- Android/Chrome PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="PagLuz" />
    
    <!-- Microsoft Tile -->
    <meta name="msapplication-TileColor" content="#01375A" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="msapplication-config" content="none" />
    
    <!-- Disable phone number detection on iOS -->
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Cache Control - Força sempre buscar versão mais recente -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons (múltiplas resoluções) -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />
    
    <!-- Apple Splash Screens (status bar) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Preconnect para performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet" />
    
    <!-- SEO -->
    <title>PagLuz - Sistema de Gestão Energética</title>
    <meta name="description" content="Plataforma inteligente para gestão de energia renovável e economia energética" />
    <meta name="keywords" content="energia, solar, renovável, economia, gestão, PagLuz" />
    <meta name="author" content="PagLuz" />
    
    <!-- Open Graph (compartilhamento social) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PagLuz - Sistema de Gestão Energética" />
    <meta property="og:description" content="Plataforma inteligente para gestão de energia renovável e economia energética" />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    
    <!-- Prevenir zoom em inputs no iOS -->
    <style>
      /* Prevenir zoom no iOS ao focar inputs */
      @supports (-webkit-touch-callout: none) {
        input, select, textarea { font-size: 16px !important; }
      }
      /* Safe area para notch/dynamic island */
      body {
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      /* Standalone mode adjustments */
      @media (display-mode: standalone) {
        body { -webkit-user-select: none; user-select: none; }
        a, button, input, textarea, select { -webkit-user-select: auto; user-select: auto; }
        /* Prevenir pull-to-refresh no iOS standalone */
        html { overscroll-behavior-y: contain; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration (com auto-update) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const registration = await navigator.serviceWorker.register('/sw.js', {
              scope: '/',
              updateViaCache: 'none',  // Sempre verifica atualizações do SW
            });

            console.log('✅ SW registrado:', registration.scope);

            // Verificar atualizações periodicamente
            setInterval(() => {
              registration.update().catch(() => {});
            }, 60 * 60 * 1000); // A cada 1 hora

            // Detectar novo SW e notificar a aplicação
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // Dispara evento custom para o React
                    window.dispatchEvent(new CustomEvent('sw-update-available'));
                  }
                });
              }
            });

            // Quando o controlador muda (nova versão ativada), recarrega
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              if (!refreshing) {
                refreshing = true;
                window.location.reload();
              }
            });

          } catch (error) {
            console.warn('⚠️ Erro no registro do SW:', error);
          }
        });
      }
    </script>
  </body>
</html>
